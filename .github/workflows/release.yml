name: Release

# Triggers when you push a tag like v1.2.3
on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write  # needed to create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build DMG (x64 + arm64)
        env:
          # electron-builder uses this token to create the GitHub Release
          # and upload the DMG automatically
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload artifacts to release
        # electron-builder --publish always handles this, but this step
        # gives a visible summary in the Actions UI
        run: echo "Build complete — DMG uploaded to release by electron-builder"
