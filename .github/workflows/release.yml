name: Release

# Triggers when you push a tag like v1.2.3
on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write  # needed to create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & ad-hoc sign DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tell electron-builder not to search for an Apple signing cert
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build

      - name: Remove quarantine from built app (extra safety)
        run: |
          find dist -name "*.app" -exec xattr -cr {} \; 2>/dev/null || true
          echo "Quarantine attribute removed from dist apps"

      - name: Show release assets
        run: ls -lh dist/*.dmg dist/*.zip 2>/dev/null || true
